name: Setup Node.js
description: Install Node.js with npm cache and run npm ci

inputs:
  node-version:
    description: Node.js version to install
    default: '20'
  working-directory:
    description: Directory to run npm ci in
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: ${{ github.workspace }}/${{ inputs.working-directory }}/package-lock.json

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm ci
