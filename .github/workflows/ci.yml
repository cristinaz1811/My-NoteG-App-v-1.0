name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node
        with:
          working-directory: backend

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Test
        working-directory: backend
        run: npm test

  frontend:
    name: Frontend (test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node
        with:
          working-directory: frontend

      - name: Test
        working-directory: frontend
        run: npm test -- --watchAll=false

      - name: Build
        working-directory: frontend
        # CI=false so pre-existing lint warnings don't fail the build.
        # Remove once those warnings have been cleared.
        run: npm run build
        env:
          CI: false

  dashboard:
    name: Dashboard (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-python
        with:
          working-directory: dashboard

      - name: Lint
        working-directory: dashboard
        run: |
          pip install flake8
          flake8 . --max-line-length=100 --exclude=__pycache__
